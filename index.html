<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görsel CV Stüdyosu | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
        /* Gerçek bir A4 Kağıdı Görünümü */
        #cv-preview { 
            width: 210mm; min-height: 297mm; background: white; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 0 auto; 
            display: flex; overflow: hidden;
        }
        .left-col { width: 35%; background: #1e293b; color: white; padding: 30px; }
        .right-col { width: 65%; padding: 40px; color: #333; }
        .photo-container { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; border: 4px solid #3b82f6; margin: 0 auto 20px auto; background: #cbd5e1; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col lg:flex-row h-screen overflow-hidden">

    <aside class="w-full lg:w-1/3 bg-white border-r border-gray-200 p-6 overflow-y-auto z-10 shadow-lg">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">CV Oluşturucu 🎨</h2>
        
        <div class="space-y-4">
            <div class="p-4 border-2 border-dashed border-blue-300 rounded-xl bg-blue-50 text-center">
                <label class="block text-sm font-medium text-blue-700 mb-2 cursor-pointer">
                    📸 Vesikalık / Profil Fotoğrafı Yükle
                    <input type="file" id="photoUpload" accept="image/*" class="hidden" onchange="previewPhoto(event)">
                </label>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="inputName" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ad Soyad" onkeyup="updatePreview()">
                <input type="text" id="inputPosition" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Meslek/Pozisyon" onkeyup="updatePreview()">
            </div>
            
            <input type="text" id="inputEmail" class="w-full border rounded-lg p-2 text-sm outline-none" placeholder="E-posta Adresi" onkeyup="updatePreview()">
            <input type="text" id="inputSkills" class="w-full border rounded-lg p-2 text-sm outline-none" placeholder="Yetenekler (Virgülle ayırın)" onkeyup="updatePreview()">
            
            <textarea id="inputExp" rows="3" class="w-full border rounded-lg p-2 text-sm outline-none" placeholder="Kısaca deneyimlerinizden bahsedin (Yapay Zeka bunu genişletecek)"></textarea>

            <select id="langSelect" class="w-full border rounded-lg p-2 text-sm outline-none">
                <option value="Türkçe">🇹🇷 Türkçe Çıktı Al</option>
                <option value="English">🇬🇧 İngilizce Çıktı Al</option>
            </select>

            <button onclick="generateAI()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg flex justify-center items-center gap-2 transition">
                <span id="btnText">Yapay Zeka ile Metinleri Yaz ✨</span>
                <div id="loader" class="loader hidden"></div>
            </button>

            <button onclick="downloadPDF()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-lg transition mt-2">
                📥 Harika Tasarımı PDF İndir
            </button>
        </div>
    </aside>

    <main class="w-full lg:w-2/3 bg-gray-100 p-8 overflow-y-auto flex justify-center">
        <div id="cv-preview">
            
            <div class="left-col">
                <div class="photo-container">
                    <img id="cvPhoto" src="https://via.placeholder.com/150?text=Fotoğraf" alt="Profil">
                </div>
                
                <h3 class="text-lg font-bold border-b border-gray-600 pb-2 mb-3 mt-8 uppercase">İletişim</h3>
                <p id="cvEmail" class="text-sm text-gray-300 break-words">ornek@mail.com</p>

                <h3 class="text-lg font-bold border-b border-gray-600 pb-2 mb-3 mt-8 uppercase">Yetenekler</h3>
                <p id="cvSkills" class="text-sm text-gray-300 leading-relaxed">Yeteneklerinizi forma girin...</p>
            </div>

            <div class="right-col">
                <h1 id="cvName" class="text-5xl font-bold text-gray-800 tracking-tight">İsim Soyisim</h1>
                <h2 id="cvPosition" class="text-xl font-medium text-blue-600 mt-2 uppercase tracking-widest">Meslek Pozisyonu</h2>
                
                <div class="mt-10">
                    <div id="aiContent" class="text-gray-600 leading-relaxed space-y-4">
                        <p class="italic text-gray-400">"Yapay Zeka ile Metinleri Yaz" butonuna tıkladığınızda, profesyonel özetiniz ve deneyimleriniz buraya kusursuz bir şekilde yerleştirilecektir...</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Formu doldurdukça A4 kağıdını anında güncelleyen sistem
        function updatePreview() {
            document.getElementById('cvName').innerText = document.getElementById('inputName').value || 'İsim Soyisim';
            document.getElementById('cvPosition').innerText = document.getElementById('inputPosition').value || 'Meslek Pozisyonu';
            document.getElementById('cvEmail').innerText = document.getElementById('inputEmail').value || 'ornek@mail.com';
            
            const skills = document.getElementById('inputSkills').value;
            document.getElementById('cvSkills').innerHTML = skills ? skills.split(',').map(s => `• ${s.trim()}<br>`).join('') : 'Yeteneklerinizi forma girin...';
        }

        // Fotoğraf Yükleme Sistemi
        function previewPhoto(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('cvPhoto').src = reader.result;
            }
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        // Yapay Zeka Motorunu Tetikleme
        async function generateAI() {
            const btn = document.getElementById('genBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const aiContent = document.getElementById('aiContent');

            const data = {
                name: document.getElementById('inputName').value,
                position: document.getElementById('inputPosition').value,
                skills: document.getElementById('inputSkills').value,
                achievements: document.getElementById('inputExp').value,
                lang: document.getElementById('langSelect').value
            };

            btn.disabled = true; loader.classList.remove('hidden'); btnText.innerText = "Yapay Zeka Yazıyor...";

            try {
                // Yeni doğru klasör yapısına (/api/generate) istek atıyoruz
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data })
                });

                const result = await response.json();
                if (response.ok) {
                    aiContent.innerHTML = result.text; // AI'dan gelen HTML'i tasarıma yerleştir
                } else {
                    alert("Hata: " + result.error);
                }
            } catch (error) {
                alert("Bağlantı Hatası! Vercel'in güncellenmesi için 1 dakika bekleyip tekrar deneyin.");
            } finally {
                btn.disabled = false; loader.classList.add('hidden'); btnText.innerText = "Yapay Zeka ile Metinleri Yaz ✨";
            }
        }

        // Harika Görseli PDF Olarak İndirme (html2pdf motoru)
        function downloadPDF() {
            const element = document.getElementById('cv-preview');
            const opt = {
                margin:       0,
                filename:     'Profesyonel_CV.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
