<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostSaaS | Enterprise CV AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#000000',
                        surface: '#0A0A0A',
                        surfaceBorder: '#222222',
                        primary: '#FFFFFF',
                        secondary: '#888888',
                        accent: '#0070F3' // Vercel Mavisi
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #000000; color: #FFFFFF; font-family: 'Inter', sans-serif; }
        .input-field { background: #0A0A0A; border: 1px solid #222222; color: #FFFFFF; transition: all 0.2s ease; }
        .input-field:focus { border-color: #555555; outline: none; box-shadow: 0 0 0 1px #555555; }
        .btn-primary { background: #FFFFFF; color: #000000; transition: all 0.2s; }
        .btn-primary:hover { background: #EAEAEA; transform: translateY(-1px); }
        .btn-secondary { background: #0A0A0A; border: 1px solid #222222; color: #FFFFFF; transition: all 0.2s; }
        .btn-secondary:hover { background: #111111; border-color: #444444; }
        
        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }
        
        .loader { border: 2px solid #000; border-top-color: transparent; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-accent selection:text-white">

    <header class="h-16 border-b border-surfaceBorder flex items-center justify-between px-8 bg-background z-10">
        <div class="flex items-center gap-3">
            <div class="w-6 h-6 bg-white rounded-sm flex items-center justify-center">
                <span class="text-black font-bold text-xs">G</span>
            </div>
            <h1 class="font-medium tracking-tight">GhostSaaS <span class="text-secondary font-normal ml-2">Enterprise OS</span></h1>
        </div>
        <div class="flex items-center gap-4 text-sm text-secondary">
            <span class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-green-500"></div> API Active</span>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <aside class="w-full lg:w-[450px] border-r border-surfaceBorder bg-surface p-8 overflow-y-auto flex flex-col gap-6">
            <div>
                <h2 class="text-lg font-medium mb-1">Global İçerik Motoru</h2>
                <p class="text-sm text-secondary">Aday verilerini girin ve hedef pazara uygun içerik üretin.</p>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4 pb-4 border-b border-surfaceBorder">
                    <div>
                        <label class="block text-xs text-secondary mb-1.5 uppercase tracking-wider">Çıktı Dili</label>
                        <select id="langSelect" class="input-field w-full rounded-md px-3 py-2 text-sm appearance-none cursor-pointer">
                            <option value="English">🇬🇧 English</option>
                            <option value="Türkçe">🇹🇷 Türkçe</option>
                            <option value="German">🇩🇪 Deutsch (Almanca)</option>
                            <option value="Spanish">🇪🇸 Español (İspanyolca)</option>
                            <option value="French">🇫🇷 Français (Fransızca)</option>
                            <option value="Italian">🇮🇹 Italiano (İtalyanca)</option>
                            <option value="Dutch">🇳🇱 Nederlands (Felemenkçe)</option>
                            <option value="Portuguese">🇵🇹 Português (Portekizce)</option>
                            <option value="Russian">🇷🇺 Русский (Rusça)</option>
                            <option value="Arabic">🇦🇪 العربية (Arapça)</option>
                            <option value="Chinese">🇨🇳 中文 (Çince)</option>
                            <option value="Japanese">🇯🇵 日本語 (Japonca)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-secondary mb-1.5 uppercase tracking-wider">Hedef Ülke</label>
                        <input list="countries" id="inputCountry" class="input-field w-full rounded-md px-3 py-2 text-sm" placeholder="Örn: Germany">
                        <datalist id="countries">
                            <option value="United States"><option value="United Kingdom"><option value="Germany"><option value="Canada">
                            <option value="Australia"><option value="Netherlands"><option value="France"><option value="Switzerland">
                            <option value="Sweden"><option value="Norway"><option value="Denmark"><option value="United Arab Emirates">
                            <option value="Turkey"><option value="Singapore"><option value="Japan"><option value="Remote / Global">
                        </datalist>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-secondary mb-1.5">Ad Soyad</label>
                        <input type="text" id="inputName" class="input-field w-full rounded-md px-3 py-2 text-sm" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-xs text-secondary mb-1.5">Pozisyon</label>
                        <input type="text" id="inputPosition" class="input-field w-full rounded-md px-3 py-2 text-sm" placeholder="Product Manager">
                    </div>
                </div>

                <div>
                    <label class="block text-xs text-secondary mb-1.5">Sektör</label>
                    <input type="text" id="inputSector" class="input-field w-full rounded-md px-3 py-2 text-sm" placeholder="Fintech / Software">
                </div>

                <div>
                    <label class="block text-xs text-secondary mb-1.5">Anahtar Yetenekler</label>
                    <input type="text" id="inputSkills" class="input-field w-full rounded-md px-3 py-2 text-sm" placeholder="Agile, Python, B2B Sales...">
                </div>

                <div>
                    <label class="block text-xs text-secondary mb-1.5">Kısa Geçmiş & Başarılar</label>
                    <textarea id="inputExp" rows="5" class="input-field w-full rounded-md px-3 py-2 text-sm resize-none" placeholder="Geçmiş deneyimleri, alınan sorumlulukları ve başarıları metriklerle yazın..."></textarea>
                </div>

                <button id="generateBtn" onclick="generateContent()" class="btn-primary w-full py-2.5 rounded-md font-medium text-sm flex items-center justify-center gap-2 mt-2">
                    <span id="btnText">İçeriği Oluştur</span>
                    <div id="btnLoader" class="loader hidden"></div>
                </button>
            </div>
        </aside>

        <section class="flex-1 flex flex-col bg-background relative">
            <div class="h-14 border-b border-surfaceBorder flex items-center justify-between px-6 bg-surface/50 backdrop-blur-md absolute top-0 w-full z-10">
                <span class="text-xs text-secondary font-mono">output.md</span>
                <button onclick="downloadPDF()" class="btn-secondary px-3 py-1.5 rounded text-xs flex items-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    PDF Olarak Kaydet
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto pt-20 pb-10 px-8 lg:px-16">
                <div id="outputArea" class="max-w-3xl mx-auto font-mono text-sm leading-loose text-gray-300 whitespace-pre-wrap">
// Sistem Hazır.
// Sol panelden verileri girip motoru başlatın.
// GhostSaaS Enterprise AI, global ATS standartlarına uygun içeriği buraya derleyecektir...
                </div>
            </div>
        </section>

    </main>

    <script>
        async function generateContent() {
            const btn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const outputArea = document.getElementById('outputArea');

            const data = {
                name: document.getElementById('inputName').value || 'Aday',
                position: document.getElementById('inputPosition').value || 'Profesyonel',
                sector: document.getElementById('inputSector').value || 'Genel',
                country: document.getElementById('inputCountry').value || 'Global',
                skills: document.getElementById('inputSkills').value || '',
                achievements: document.getElementById('inputExp').value || '',
                lang: document.getElementById('langSelect').value
            };

            btn.disabled = true;
            btnText.innerText = "İşleniyor...";
            btnLoader.classList.remove('hidden');
            outputArea.innerText = "> Hedef pazar (" + data.country + ") analiz ediliyor...\n> Dil motoru (" + data.lang + ") başlatıldı...\n> Lütfen bekleyin.";

            try {
                // Daha önce düzelttiğimiz çalışan rotasyon
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'cv', data: data })
                });

                const result = await response.json();

                if (response.ok && result.text) {
                    outputArea.innerText = result.text;
                } else {
                    outputArea.innerText = "Sunucu Hatası: " + (result.error || "Yanıt alınamadı.");
                }
            } catch (error) {
                console.error(error);
                outputArea.innerText = "Bağlantı hatası! Sistemin Vercel üzerinde aktif olduğundan emin olun.";
            } finally {
                btn.disabled = false;
                btnText.innerText = "İçeriği Oluştur";
                btnLoader.classList.add('hidden');
            }
        }

        function downloadPDF() {
            const text = document.getElementById('outputArea').innerText;
            if(!text || text.includes("Sistem Hazır")) return alert("Önce içerik üretin!");
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFont("helvetica"); 
            doc.setFontSize(10);
            
            const splitText = doc.splitTextToSize(text, 180);
            let y = 20;
            for(let i = 0; i < splitText.length; i++){
                if (y > 280) { doc.addPage(); y = 20; }
                doc.text(splitText[i], 15, y); y += 5;
            }
            doc.save("GhostSaaS_Enterprise_Export.pdf");
        }
    </script>
</body>
</html>
